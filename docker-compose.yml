services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
      - migrate

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: celery -A app.workers.celery_app worker -l INFO -Q image_jobs,billing,notifications
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
      - migrate

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: alembic -c alembic.ini upgrade head
    env_file:
      - .env
    depends_on:
      - postgres

  bootstrap:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m app.bootstrap --ensure-bucket
    env_file:
      - .env
    depends_on:
      - minio
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lumiaflow
      POSTGRES_USER: lumiaflow
      POSTGRES_PASSWORD: lumiaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
